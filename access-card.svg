<svg viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', Consolas, monospace">

  <defs>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="radarFade" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="cardClip"><rect x="2" y="2" width="896" height="256" rx="16"/></clipPath>
    <clipPath id="radarClip"><circle cx="150" cy="138" r="86"/></clipPath>
    <clipPath id="tickerClip"><rect x="20" y="220" width="860" height="22"/></clipPath>
  </defs>

  <rect x="1" y="1" width="898" height="258" rx="16" fill="#05080a" stroke="url(#borderGrad)" stroke-width="2"/>

  <g clip-path="url(#cardClip)">

    <!-- ambient kernel syscalls, flickering low-opacity, fill the gaps between panels -->
    <g fill="#1f6b52" font-size="11">
      <text x="250" y="34" opacity="0.15">ptrace<animate attributeName="opacity" values="0.05;0.4;0.05" dur="3.2s" begin="0s" repeatCount="indefinite"/></text>
      <text x="250" y="58" opacity="0.15">mmap<animate attributeName="opacity" values="0.05;0.4;0.05" dur="2.6s" begin="0.4s" repeatCount="indefinite"/></text>
      <text x="250" y="82" opacity="0.15">execve<animate attributeName="opacity" values="0.05;0.4;0.05" dur="3.6s" begin="0.9s" repeatCount="indefinite"/></text>
      <text x="250" y="106" opacity="0.15">clone<animate attributeName="opacity" values="0.05;0.4;0.05" dur="2.9s" begin="1.3s" repeatCount="indefinite"/></text>
      <text x="250" y="130" opacity="0.15">ioctl<animate attributeName="opacity" values="0.05;0.4;0.05" dur="3.1s" begin="0.2s" repeatCount="indefinite"/></text>
      <text x="250" y="154" opacity="0.15">kprobe<animate attributeName="opacity" values="0.05;0.4;0.05" dur="2.4s" begin="1.7s" repeatCount="indefinite"/></text>
      <text x="250" y="178" opacity="0.15">insmod<animate attributeName="opacity" values="0.05;0.4;0.05" dur="3.4s" begin="0.6s" repeatCount="indefinite"/></text>
    </g>

    <g fill="#1f6b52" font-size="11">
      <text x="562" y="34" opacity="0.15">fork<animate attributeName="opacity" values="0.05;0.4;0.05" dur="3.0s" begin="0.3s" repeatCount="indefinite"/></text>
      <text x="562" y="58" opacity="0.15">brk<animate attributeName="opacity" values="0.05;0.4;0.05" dur="2.7s" begin="1.1s" repeatCount="indefinite"/></text>
      <text x="562" y="82" opacity="0.15">mprotect<animate attributeName="opacity" values="0.05;0.4;0.05" dur="3.3s" begin="0.5s" repeatCount="indefinite"/></text>
      <text x="562" y="106" opacity="0.15">syscall<animate attributeName="opacity" values="0.05;0.4;0.05" dur="2.5s" begin="1.6s" repeatCount="indefinite"/></text>
      <text x="562" y="130" opacity="0.15">kill<animate attributeName="opacity" values="0.05;0.4;0.05" dur="3.5s" begin="0.1s" repeatCount="indefinite"/></text>
      <text x="562" y="154" opacity="0.15">read<animate attributeName="opacity" values="0.05;0.4;0.05" dur="2.8s" begin="0.8s" repeatCount="indefinite"/></text>
      <text x="562" y="178" opacity="0.15">write<animate attributeName="opacity" values="0.05;0.4;0.05" dur="3.2s" begin="1.4s" repeatCount="indefinite"/></text>
    </g>

    <!-- radar / network scan -->
    <g>
      <circle cx="150" cy="138" r="86" fill="none" stroke="#173f34" stroke-width="1"/>
      <circle cx="150" cy="138" r="58" fill="none" stroke="#173f34" stroke-width="1"/>
      <circle cx="150" cy="138" r="30" fill="none" stroke="#173f34" stroke-width="1"/>
      <line x1="64" y1="138" x2="236" y2="138" stroke="#173f34" stroke-width="1"/>
      <line x1="150" y1="52" x2="150" y2="224" stroke="#173f34" stroke-width="1"/>

      <g clip-path="url(#radarClip)">
        <path d="M150,138 L150,52 A86,86 0 0,1 224,96 Z" fill="url(#radarFade)">
          <animateTransform attributeName="transform" type="rotate" from="0 150 138" to="360 150 138" dur="4s" repeatCount="indefinite"/>
        </path>
      </g>

      <circle cx="188" cy="108" r="4" fill="#22D3EE" opacity="0.6">
        <animate attributeName="opacity" values="0.15;1;0.15" dur="2.2s" begin="0.3s" repeatCount="indefinite"/>
      </circle>
      <text x="196" y="111" font-size="9" fill="#7fd8e8">DC01</text>

      <circle cx="118" cy="168" r="4" fill="#b0392f" opacity="0.6">
        <animate attributeName="opacity" values="0.15;1;0.15" dur="2.8s" begin="0.9s" repeatCount="indefinite"/>
      </circle>
      <text x="78" y="182" font-size="9" fill="#e0968b">root</text>

      <circle cx="176" cy="176" r="3.5" fill="#c99a52" opacity="0.6">
        <animate attributeName="opacity" values="0.15;1;0.15" dur="2.5s" begin="1.4s" repeatCount="indefinite"/>
      </circle>
      <text x="182" y="192" font-size="9" fill="#dcbb85">SRV-07</text>

      <text x="150" y="245" text-anchor="middle" font-size="9" fill="#3f5951" letter-spacing="2">NETWORK SCAN</text>
    </g>

    <!-- glitch title (chromatic aberration via 3 offset copies) -->
    <g font-weight="bold" letter-spacing="2">
      <text x="292" y="92" font-size="40" fill="#ff2fb0" opacity="0.55">SOLDEUS
        <animate attributeName="x" values="292;295;290;292" dur="3.6s" repeatCount="indefinite"/>
      </text>
      <text x="288" y="92" font-size="40" fill="#22D3EE" opacity="0.55">SOLDEUS
        <animate attributeName="x" values="288;284;291;288" dur="3.6s" repeatCount="indefinite"/>
      </text>
      <text x="290" y="92" font-size="40" fill="#eaf6f0">SOLDEUS</text>
    </g>

    <text x="291" y="118" font-size="13" fill="#7aa58f" letter-spacing="3">RED TEAM // KERNEL // ACTIVE DIRECTORY</text>

    <circle cx="294" cy="145" r="5" fill="#27c93f">
      <animate attributeName="opacity" values="1;0.25;1" dur="1.3s" repeatCount="indefinite"/>
    </circle>
    <text x="308" y="150" font-size="13" fill="#9fd6b8" letter-spacing="1">ROOT ACCESS GRANTED</text>

    <!-- Kerberos ticket readout — a wink for anyone who knows what a Golden Ticket is -->
    <g>
      <text x="590" y="52" font-size="11" fill="#8eb3a0" letter-spacing="2">KERBEROS TICKET-GRANTING-TICKET</text>
      <line x1="590" y1="62" x2="880" y2="62" stroke="#173f34"/>
      <text x="590" y="86" font-size="13" fill="#c6d1cc">PRINCIPAL&#160;&#160;soldeus@ARCH.LOCAL</text>
      <text x="590" y="108" font-size="13" fill="#c6d1cc">REALM&#160;&#160;&#160;&#160;&#160;&#160;&#160;REDTEAM.OPS</text>
      <text x="590" y="130" font-size="13" fill="#c6d1cc">ENC-TYPE&#160;&#160;&#160;AES256-CTS-HMAC</text>
      <text x="590" y="152" font-size="13" fill="#c6d1cc">FLAGS&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;forwardable, renewable</text>
      <text x="590" y="178" font-size="13" fill="#c6d1cc">STATUS</text>
      <text x="662" y="178" font-size="13" fill="#e8c468">&#9679; GOLDEN
        <animate attributeName="opacity" values="1;0.4;1" dur="1.8s" repeatCount="indefinite"/>
      </text>
    </g>

    <!-- LIVE indicator -->
    <circle cx="856" cy="28" r="5" fill="#ff5f56">
      <animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <text x="844" y="32" text-anchor="end" font-size="11" fill="#ff8f87" letter-spacing="2">LIVE</text>

    <!-- scrolling hex/exploit-dev ticker along the bottom -->
    <g clip-path="url(#tickerClip)" font-size="12" fill="#3f5951">
      <text x="880" y="236">0x41414141&#160;&#160;&#160;0xdeadbeef&#160;&#160;&#160;0x7ffc3a2e&#160;&#160;&#160;0x08048000&#160;&#160;&#160;SEGFAULT&#160;&#160;&#160;CORE DUMPED&#160;&#160;&#160;0x41414141&#160;&#160;&#160;0xdeadbeef
        <animate attributeName="x" values="880;-880" dur="14s" repeatCount="indefinite"/>
      </text>
    </g>

    <!-- CRT scanline sweep -->
    <rect x="0" y="-30" width="900" height="6" fill="#22D3EE" opacity="0.07">
      <animate attributeName="y" values="-30;290" dur="5s" repeatCount="indefinite"/>
    </rect>

  </g>
</svg>
